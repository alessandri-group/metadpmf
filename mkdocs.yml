site_name: metadpmf
site_description: Metadynamics PMF workflow for GROMACS + PLUMED
site_url: https://alessandri-group.github.io/metadpmf/
repo_url: https://github.com/alessandri-group/metadpmf

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  palette:
    primary: teal
    accent: cyan
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

nav:
  - Getting started: index.md
  - Tutorial: tutorial.md
  - Tutorial — 2D FES: tutorial_2d.md
  - Configuration reference: config.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.arithmatex:
      generic: true
  - tables

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
